<!DOCTYPE html>
<html>
<head><title>Sprite Debug</title>
<style>body{background:#111;color:#fff;font-family:monospace;} canvas{border:1px solid #444;display:block;margin:4px 0;} .row{display:flex;align-items:center;gap:8px;margin:4px 0;}</style>
</head>
<body>
<h3>Dancy Pixel Spritesheet — Row Inspector (256×478 per frame, 7 cols × 5 rows)</h3>
<script>
const img = new Image();
img.src = '/assets/sprites/danidu-walk.png';
img.onload = () => {
  const FRAME_W = 256, FRAME_H = 478, COLS = 7, ROWS = 5;
  for (let row = 0; row < ROWS; row++) {
    const div = document.createElement('div');
    div.className = 'row';
    const label = document.createElement('span');
    label.textContent = 'Row ' + row + ' (y=' + (row*FRAME_H) + '):';
    label.style.minWidth = '160px';
    div.appendChild(label);
    for (let col = 0; col < COLS; col++) {
      const c = document.createElement('canvas');
      c.width = 64; c.height = 96;
      const ctx = c.getContext('2d');
      ctx.fillStyle = '#222';
      ctx.fillRect(0,0,64,96);
      ctx.drawImage(img, col*FRAME_W, row*FRAME_H, FRAME_W, FRAME_H, 0, 0, 64, 96);
      div.appendChild(c);
    }
    document.body.appendChild(div);
  }
};
</script>
</body>
</html>
